<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Achromatopsia Simulator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: black; font-family: system-ui, sans-serif; }
    #video { display: none; }
    #canvas { width: 100vw; height: 100vh; object-fit: cover; display: block; }
    #error {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      color: #ff6b6b;
      background: rgba(0,0,0,0.7);
      padding: 8px 12px;
      font-size: 14px;
      border-radius: 6px;
      display: none;
    }
    .controls {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      z-index: 10;
    }
    .pill {
      padding: 7px 14px;
      border-radius: 20px;
      border: 2px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.5);
      color: #999;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      white-space: nowrap;
    }
    .pill:active { background: rgba(255,255,255,0.15); }
    .pill.on { border-color: rgba(255,255,255,0.7); color: #fff; }
    .pill.hidden { display: none; }
    .pill-gear {
      padding: 7px 10px;
      font-size: 16px;
      line-height: 1;
    }
    #settings-panel {
      position: absolute;
      right: 10px;
      background: rgba(0,0,0,0.8);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 12px 14px;
      display: none;
      flex-direction: column;
      gap: 10px;
      z-index: 20;
      min-width: 240px;
    }
    .settings-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .settings-row label {
      color: #ccc;
      font-size: 12px;
      white-space: nowrap;
      min-width: 118px;
    }
    .settings-row .val {
      min-width: 36px;
      text-align: right;
      color: #ccc;
      font-size: 12px;
    }
    .settings-row input[type=range] {
      flex: 1;
      accent-color: #aaa;
    }
    .settings-row select {
      flex: 1;
      background: rgba(255,255,255,0.1);
      color: #ccc;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      padding: 4px 6px;
      font-size: 12px;
    }
    #sliders {
      position: absolute;
      bottom: 20px;
      left: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
    }
    .slider-row {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.55);
      padding: 8px 12px;
      border-radius: 8px;
    }
    .slider-row label {
      color: #ccc;
      font-size: 12px;
      white-space: nowrap;
      min-width: 64px;
    }
    .slider-row .val {
      min-width: 48px;
      text-align: right;
    }
    .slider-row input[type=range] {
      flex: 1;
      accent-color: #aaa;
    }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="error" role="alert"></div>
  <div class="controls">
    <div id="btn-gray" class="pill on" title="Turn off to see the camera in full color">Grayscale</div>
    <div id="btn-blur" class="pill on">Blur</div>
    <div id="btn-et" class="pill on hidden" title="Simulates glare / photophobia in bright conditions">Glare</div>
    <div id="btn-settings" class="pill pill-gear" title="Settings">&#x2699;</div>
  </div>
  <div id="settings-panel">
    <div class="settings-row">
      <label id="label-gray-type">Grayscale type</label>
      <select id="gray-mode">
        <option value="scotopic" selected>Science-based</option>
        <option value="rec601">Plain B&amp;W</option>
      </select>
    </div>
    <div class="settings-row">
      <label id="label-language">Language</label>
      <select id="lang-select">
        <option value="auto" selected>System default</option>
        <option value="en">English</option>
        <option value="cs">Czech</option>
      </select>
    </div>
    <div id="et-row" class="settings-row" style="display:none">
      <label id="label-shutter">Shutter <span id="et-auto" style="font-weight:400;opacity:0.6;font-size:10px">(auto)</span></label>
      <input type="range" id="et-slider" min="1" max="100" value="1">
      <span id="et-val" class="val">--</span>
    </div>
    <div id="cam-row" class="settings-row" style="display:none">
      <label id="label-camera">Camera</label>
      <select id="cam-select"></select>
    </div>
  </div>
  <div id="sliders">
    <div id="blur-row" class="slider-row" style="display:flex">
      <label id="label-sharpness">Sharpness</label>
      <input type="range" id="blur-slider" min="50" max="300" value="100" step="25">
      <label id="blur-val" class="val">0.100</label>
    </div>
  </div>
  <script>
    const VERT_SRC = `
attribute vec2 aPos;
varying vec2 vTexCoord;
void main() {
    vTexCoord = aPos * 0.5 + 0.5;
    gl_Position = vec4(aPos, 0.0, 1.0);
}`;

    const FRAG_SRC = `
precision mediump float;
uniform sampler2D uVideo;
uniform bool uGrayscale;
uniform int uGrayMode;
varying vec2 vTexCoord;

vec3 srgbToLinear(vec3 c) {
    vec3 lo = c / 12.92;
    vec3 hi = pow((c + 0.055) / 1.055, vec3(2.4));
    return mix(lo, hi, step(0.04045, c));
}

float linearToSrgb(float c) {
    float lo = 12.92 * c;
    float hi = 1.055 * pow(c, 1.0 / 2.4) - 0.055;
    return mix(lo, hi, step(0.0031308, c));
}

void main() {
    vec2 uv = vec2(vTexCoord.x, 1.0 - vTexCoord.y);
    vec4 color = texture2D(uVideo, uv);

    if (uGrayscale) {
        float lum;
        if (uGrayMode == 0) {
            vec3 lin = srgbToLinear(color.rgb);
            lum = linearToSrgb(dot(lin, vec3(0.007, 0.519, 0.474)));
        } else {
            lum = dot(color.rgb, vec3(0.299, 0.587, 0.114));
        }
        color = vec4(vec3(lum), 1.0);
    }

    gl_FragColor = color;
}`;

    const DS_FRAG_SRC = `
precision mediump float;
uniform sampler2D uSrc;
uniform vec2 uSrcSize;
void main() {
    vec2 cellSize = vec2(16.0, 16.0);
    vec2 base = floor(gl_FragCoord.xy) * cellSize;
    float total = 0.0;
    float count = 0.0;
    for (int y = 0; y < 16; y++) {
        for (int x = 0; x < 16; x++) {
            vec2 px = base + vec2(float(x), float(y)) + 0.5;
            if (px.x < uSrcSize.x && px.y < uSrcSize.y) {
                vec4 c = texture2D(uSrc, px / uSrcSize);
                total += dot(c.rgb, vec3(0.2126, 0.7152, 0.0722));
                count += 1.0;
            }
        }
    }
    float avg = total / max(count, 1.0);
    gl_FragColor = vec4(avg, avg, avg, 1.0);
}`;

    const I18N = {
      en: {
        title: 'Achromatopsia Simulator',
        grayscale: 'Grayscale',
        grayscaleTitle: 'Turn off to see the camera in full color',
        blur: 'Blur',
        glare: 'Glare',
        glareTitle: 'Simulates glare / photophobia in bright conditions',
        settingsTitle: 'Settings',
        grayType: 'Grayscale type',
        grayScience: 'Science-based',
        grayPlain: 'Plain B&W',
        camera: 'Camera',
        sharpness: 'Sharpness',
        shutter: 'Shutter',
        shutterAuto: '(auto)',
        errWebGL: 'WebGL not supported. Try Chrome or Safari.',
        errCameraUnsupported: 'Camera access not supported. Try Chrome or Safari.',
        errCameraFailed: 'Camera failed: {0}',
        errSwitchFailed: 'Camera switch failed: {0}',
        langLabel: 'Language',
        langAuto: 'System default',
        langEn: 'English',
        langCs: 'Czech',
      },
      cs: {
        title: 'Simulátor achromatopsie',
        grayscale: 'Stupně šedi',
        grayscaleTitle: 'Vypněte pro barevný obraz z kamery',
        blur: 'Rozmazání',
        glare: 'Oslnění',
        glareTitle: 'Simuluje oslnění při jasném osvětlení',
        settingsTitle: 'Nastavení',
        grayType: 'Typ stupňů šedi',
        grayScience: 'Vědecky podložené',
        grayPlain: 'Obyčejná černobílá',
        camera: 'Kamera',
        sharpness: 'Ostrost',
        shutter: 'Závěrka',
        shutterAuto: '(auto)',
        errWebGL: 'WebGL není podporován. Zkuste Chrome nebo Safari.',
        errCameraUnsupported: 'Přístup ke kameře není podporován. Zkuste Chrome nebo Safari.',
        errCameraFailed: 'Kamera selhala: {0}',
        errSwitchFailed: 'Přepnutí kamery selhalo: {0}',
        langLabel: 'Jazyk',
        langAuto: 'Podle systému',
        langEn: 'Angličtina',
        langCs: 'Čeština',
      },
    };

    const LOCALE_STORAGE_KEY = 'achromatopsia-simulator-locale';

    function pickLocale() {
      const list = (navigator.languages && navigator.languages.length)
        ? [...navigator.languages]
        : [navigator.language || 'en'];
      for (const tag of list) {
        const base = String(tag).split('-')[0].toLowerCase();
        if (base === 'cs') return 'cs';
      }
      return 'en';
    }

    function readLocaleOverride() {
      try {
        const v = localStorage.getItem(LOCALE_STORAGE_KEY);
        if (v === 'en' || v === 'cs') return v;
      } catch (e) { /* private mode, disabled storage */ }
      return null;
    }

    function getEffectiveLocale() {
      const override = readLocaleOverride();
      if (override) return override;
      return pickLocale();
    }

    const sim = {
      video: document.getElementById('video'),
      canvas: document.getElementById('canvas'),
      errorDiv: document.getElementById('error'),
      btnGray: document.getElementById('btn-gray'),
      btnET: document.getElementById('btn-et'),
      btnSettings: document.getElementById('btn-settings'),
      settingsPanel: document.getElementById('settings-panel'),
      etRow: document.getElementById('et-row'),
      etSlider: document.getElementById('et-slider'),
      etVal: document.getElementById('et-val'),
      grayModeSelect: document.getElementById('gray-mode'),
      btnBlur: document.getElementById('btn-blur'),
      blurRow: document.getElementById('blur-row'),
      blurSlider: document.getElementById('blur-slider'),
      blurVal: document.getElementById('blur-val'),
      camRow: document.getElementById('cam-row'),
      camSelect: document.getElementById('cam-select'),
      langSelect: document.getElementById('lang-select'),
      etAutoSpan: document.getElementById('et-auto'),
      stream: null,
      track: null,
      rafId: null,
      gl: null,
      glProgram: null,
      glUniforms: null,
      glTexture: null,
      texSourceCanvas: null,
      texSourceCtx: null,
      useCanvasWorkaround: false,
      _glLifecycleBound: false,
      caps: null,
      supportsET: false,
      supportsISO: false,
      aperture: 1.8,
      grayscaleOn: true,
      grayMode: 'scotopic',
      etOn: true,
      manualET: null,
      blurOn: true,
      blurVA: 0.10,
      settingsOpen: false,
      cameras: [],
      cameraIndex: -1,
      locale: 'en',
      strings: I18N.en,
      dsProgram: null,
      dsAPos: -1,
      dsUniforms: null,
      dsChain: [],
      meterFrameCounter: 0,
      METER_EVERY_N: 10,
      AE_TARGET: 0.35,
      AE_DAMPING: 0.15,
      AE_LUM_DEADBAND: 0.02,
      autoET: true,
      _etApplyPending: false,

      initGL() {
        const gl = this.canvas.getContext('webgl', { antialias: false, depth: false, stencil: false });
        if (!gl) return false;
        this.gl = gl;

        const vs = gl.createShader(gl.VERTEX_SHADER);
        gl.shaderSource(vs, VERT_SRC);
        gl.compileShader(vs);
        if (!gl.getShaderParameter(vs, gl.COMPILE_STATUS)) {
          console.error('Vertex shader:', gl.getShaderInfoLog(vs));
          return false;
        }

        const fs = gl.createShader(gl.FRAGMENT_SHADER);
        gl.shaderSource(fs, FRAG_SRC);
        gl.compileShader(fs);
        if (!gl.getShaderParameter(fs, gl.COMPILE_STATUS)) {
          console.error('Fragment shader:', gl.getShaderInfoLog(fs));
          return false;
        }

        const prog = gl.createProgram();
        gl.attachShader(prog, vs);
        gl.attachShader(prog, fs);
        gl.linkProgram(prog);
        if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
          console.error('Program link:', gl.getProgramInfoLog(prog));
          return false;
        }
        this.glProgram = prog;
        gl.useProgram(prog);

        this.glUniforms = {
          uVideo: gl.getUniformLocation(prog, 'uVideo'),
          uGrayscale: gl.getUniformLocation(prog, 'uGrayscale'),
          uGrayMode: gl.getUniformLocation(prog, 'uGrayMode'),
        };

        const quad = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
        const buf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.bufferData(gl.ARRAY_BUFFER, quad, gl.STATIC_DRAW);
        const aPos = gl.getAttribLocation(prog, 'aPos');
        gl.enableVertexAttribArray(aPos);
        gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

        const tex = gl.createTexture();
        gl.bindTexture(gl.TEXTURE_2D, tex);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
        this.glTexture = tex;

        gl.uniform1i(this.glUniforms.uVideo, 0);

        this.initDownsamplePipeline(gl);

        if (!this._glLifecycleBound) {
          this._glLifecycleBound = true;
          this.canvas.addEventListener('webglcontextlost', (e) => {
            e.preventDefault();
            if (this.rafId) { cancelAnimationFrame(this.rafId); this.rafId = null; }
          });
          this.canvas.addEventListener('webglcontextrestored', () => {
            this.initGL();
            if (this.video.readyState >= 2) {
              this.resetVideoTextureWorkaround();
              this.detectTexImageVideoSupport();
            }
            this.processFrame();
          });
        }

        return true;
      },

      initDownsamplePipeline(gl) {
        const vs = gl.createShader(gl.VERTEX_SHADER);
        gl.shaderSource(vs, VERT_SRC);
        gl.compileShader(vs);
        const fs = gl.createShader(gl.FRAGMENT_SHADER);
        gl.shaderSource(fs, DS_FRAG_SRC);
        gl.compileShader(fs);
        if (!gl.getShaderParameter(fs, gl.COMPILE_STATUS)) {
          console.error('Downsample shader:', gl.getShaderInfoLog(fs));
          return;
        }
        const prog = gl.createProgram();
        gl.attachShader(prog, vs);
        gl.attachShader(prog, fs);
        gl.linkProgram(prog);
        if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
          console.error('Downsample program link:', gl.getProgramInfoLog(prog));
          return;
        }
        this.dsProgram = prog;
        this.dsAPos = gl.getAttribLocation(prog, 'aPos');
        this.dsUniforms = {
          uSrc: gl.getUniformLocation(prog, 'uSrc'),
          uSrcSize: gl.getUniformLocation(prog, 'uSrcSize'),
        };
      },

      buildDSChain(w, h) {
        const gl = this.gl;
        if (!gl || !this.dsProgram) return;
        this.dsChain.forEach(level => {
          gl.deleteTexture(level.tex);
          gl.deleteFramebuffer(level.fbo);
        });
        this.dsChain = [];
        let sw = w, sh = h;
        while (sw > 1 || sh > 1) {
          const dw = Math.max(1, Math.ceil(sw / 16));
          const dh = Math.max(1, Math.ceil(sh / 16));
          const tex = gl.createTexture();
          gl.bindTexture(gl.TEXTURE_2D, tex);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
          gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, dw, dh, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
          const fbo = gl.createFramebuffer();
          gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
          gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
          this.dsChain.push({ tex, fbo, w: dw, h: dh, srcW: sw, srcH: sh });
          sw = dw;
          sh = dh;
        }
        gl.bindFramebuffer(gl.FRAMEBUFFER, null);
      },

      resetVideoTextureWorkaround() {
        this.useCanvasWorkaround = false;
        this.texSourceCanvas = null;
        this.texSourceCtx = null;
      },

      detectTexImageVideoSupport() {
        const gl = this.gl;
        try {
          gl.bindTexture(gl.TEXTURE_2D, this.glTexture);
          while (gl.getError() !== gl.NO_ERROR) { /* drain stale errors */ }
          gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, this.video);
          if (gl.getError() !== gl.NO_ERROR) {
            this.useCanvasWorkaround = true;
          }
        } catch (e) {
          this.useCanvasWorkaround = true;
        }
        if (this.useCanvasWorkaround) {
          console.log('Using canvas intermediary for video texture upload');
          this.texSourceCanvas = document.createElement('canvas');
          this.texSourceCtx = this.texSourceCanvas.getContext('2d');
        }
      },

      updateCanvasSize() {
        const vw = this.video.videoWidth;
        const vh = this.video.videoHeight;
        if (!vw || !vh) return;
        this.canvas.width = vw;
        this.canvas.height = vh;
        if (this.gl) this.gl.viewport(0, 0, vw, vh);
        if (this.useCanvasWorkaround && this.texSourceCanvas) {
          this.texSourceCanvas.width = vw;
          this.texSourceCanvas.height = vh;
        }
        this.buildDSChain(vw, vh);
      },

      uploadVideoTexture() {
        const gl = this.gl;
        gl.bindTexture(gl.TEXTURE_2D, this.glTexture);
        if (this.useCanvasWorkaround) {
          const w = this.video.videoWidth;
          const h = this.video.videoHeight;
          this.texSourceCtx.drawImage(this.video, 0, 0, w, h);
          gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, this.texSourceCanvas);
        } else {
          gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, this.video);
        }
      },

      meterLuminance() {
        const gl = this.gl;
        if (!this.dsProgram || !this.dsChain.length) return -1;
        const savedProg = gl.getParameter(gl.CURRENT_PROGRAM);
        gl.useProgram(this.dsProgram);
        gl.enableVertexAttribArray(this.dsAPos);
        gl.vertexAttribPointer(this.dsAPos, 2, gl.FLOAT, false, 0, 0);
        gl.uniform1i(this.dsUniforms.uSrc, 0);

        let srcTex = this.glTexture;
        for (let i = 0; i < this.dsChain.length; i++) {
          const level = this.dsChain[i];
          gl.bindFramebuffer(gl.FRAMEBUFFER, level.fbo);
          gl.viewport(0, 0, level.w, level.h);
          gl.bindTexture(gl.TEXTURE_2D, srcTex);
          gl.uniform2f(this.dsUniforms.uSrcSize, level.srcW, level.srcH);
          gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
          srcTex = level.tex;
        }

        const px = new Uint8Array(4);
        gl.readPixels(0, 0, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, px);

        gl.bindFramebuffer(gl.FRAMEBUFFER, null);
        const vw = this.canvas.width, vh = this.canvas.height;
        if (vw && vh) gl.viewport(0, 0, vw, vh);
        gl.useProgram(savedProg);
        const mainAPos = gl.getAttribLocation(this.glProgram, 'aPos');
        gl.enableVertexAttribArray(mainAPos);
        gl.vertexAttribPointer(mainAPos, 2, gl.FLOAT, false, 0, 0);

        return px[0] / 255;
      },

      processFrame() {
        const gl = this.gl;
        if (!gl || gl.isContextLost()) return;

        this.uploadVideoTexture();

        const u = this.glUniforms;
        gl.uniform1i(u.uGrayscale, this.grayscaleOn ? 1 : 0);
        gl.uniform1i(u.uGrayMode, this.grayMode === 'scotopic' ? 0 : 1);

        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

        if (this.etOn && this.autoET && this.supportsET) {
          if (++this.meterFrameCounter >= this.METER_EVERY_N) {
            this.meterFrameCounter = 0;
            const lum = this.meterLuminance();
            if (lum >= 0) this.autoAdjustET(lum);
          }
        }

        this.rafId = requestAnimationFrame(() => this.processFrame());
      },

      async start() {
        if (!this.initGL()) {
          this.showError('errWebGL');
          return;
        }

        if (!navigator.mediaDevices?.getUserMedia) {
          this.showError('errCameraUnsupported');
          return;
        }
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
          });
          await this.attachAndPrepareStream(stream);
          await this.enumerateCameras();
          this.processFrame();
        } catch (err) {
          this.showError('errCameraFailed', err.message);
        }
      },

      async applyStreamMetadataPipeline() {
        this.updateCanvasSize();
        this.resetVideoTextureWorkaround();
        this.detectTexImageVideoSupport();
        this.updateBlurCSS();
        this.detectCapabilities();
        if (this.etOn && this.supportsET) await this.applyET();
      },

      /**
       * Assign stream, wait for loadedmetadata, then run canvas/WebGL/camera pipeline.
       * Ensures enumerateCameras → switchCamera finishes sizing the *current* track before callers continue.
       */
      async attachAndPrepareStream(stream) {
        this.stream = stream;
        this.track = stream.getVideoTracks()[0];
        this.video.onloadedmetadata = null;
        await new Promise((resolve, reject) => {
          const onMeta = async () => {
            try {
              await this.applyStreamMetadataPipeline();
              resolve();
            } catch (e) {
              reject(e);
            }
          };
          this.video.addEventListener('loadedmetadata', onMeta, { once: true });
          this.video.srcObject = stream;
          this.video.play().catch(reject);
        });
      },

      detectCapabilities() {
        this.btnET.classList.add('hidden');
        this.supportsET = false;
        this.supportsISO = false;
        if (!this.track?.getCapabilities) {
          if (this.etOn) this.disableET();
          return;
        }
        this.caps = this.track.getCapabilities();
        console.log('Camera capabilities:', this.caps);

        this.supportsET = !!(
          this.caps.exposureMode?.includes('manual') &&
          this.caps.exposureTime
        );
        this.supportsISO = !!(this.caps.iso);

        if (this.supportsET) {
          this.btnET.classList.remove('hidden');
          if (this.etOn) {
            this.btnET.classList.add('on');
            this.etRow.style.display = 'flex';
            this.updateAutoIndicator();
          }
        } else if (this.etOn) {
          this.disableET();
        }

        this.aperture = 1.8;
        console.log('Aperture (assumed):', this.aperture);
        if (this.supportsISO && this.supportsET) {
          console.log('Fixed ISO for constraints:', this.getFixedISO());
        }
      },

      async enumerateCameras() {
        if (!navigator.mediaDevices?.enumerateDevices) return;
        const devices = await navigator.mediaDevices.enumerateDevices();
        const allVideo = devices.filter(d => d.kind === 'videoinput');

        this.cameras = allVideo.filter(d => {
          if (typeof d.getCapabilities === 'function') {
            const caps = d.getCapabilities();
            if (caps.facingMode?.length) return caps.facingMode.includes('environment');
          }
          return /back|environment/i.test(d.label);
        });
        if (!this.cameras.length) this.cameras = allVideo;

        this.cameras.sort((a, b) => {
          const idA = a.label.match(/camera\s*(\d+)/i);
          const idB = b.label.match(/camera\s*(\d+)/i);
          return (idA ? +idA[1] : 999) - (idB ? +idB[1] : 999);
        });

        const currentId = this.track?.getSettings()?.deviceId;
        this.cameraIndex = this.cameras.findIndex(c => c.deviceId === currentId);
        if (this.cameraIndex === -1) this.cameraIndex = 0;

        if (this.cameraIndex !== 0) await this.switchCamera(0);

        if (this.cameras.length > 1) {
          this.camRow.style.display = 'flex';
          this.populateCameraSelect();
        }
      },

      populateCameraSelect() {
        this.camSelect.innerHTML = '';
        this.cameras.forEach((cam, i) => {
          const opt = document.createElement('option');
          opt.value = i;
          const label = cam.label || ('Camera ' + (i + 1));
          opt.textContent = label.length > 40 ? label.substring(0, 40) + '\u2026' : label;
          if (i === this.cameraIndex) opt.selected = true;
          this.camSelect.appendChild(opt);
        });
      },

      async switchCamera(targetIndex) {
        if (this.cameras.length < 2) return;
        this.cameraIndex = targetIndex !== undefined
          ? targetIndex
          : (this.cameraIndex + 1) % this.cameras.length;
        const deviceId = this.cameras[this.cameraIndex].deviceId;
        if (this.stream) {
          this.stream.getTracks().forEach(t => t.stop());
          this.video.srcObject = null;
        }
        for (let attempt = 0; attempt < 3; attempt++) {
          await new Promise(r => setTimeout(r, 300 * (attempt + 1)));
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              video: { deviceId: { exact: deviceId }, width: { ideal: 1920 }, height: { ideal: 1080 } }
            });
            await this.attachAndPrepareStream(stream);
            this.camSelect.value = this.cameraIndex;
            return;
          } catch (err) {
            if (attempt === 2) this.showError('errSwitchFailed', err.message);
          }
        }
      },

      onCameraSelectChange() {
        const idx = parseInt(this.camSelect.value);
        if (idx !== this.cameraIndex) this.switchCamera(idx);
      },

      disableET() {
        this.etOn = false;
        this.btnET.classList.remove('on');
        this.etRow.style.display = 'none';
        this.manualET = null;
        void this.resetExposure();
      },

      /** ISO applied with manual ET when the camera supports it; matches S22 calibration. */
      FIXED_ISO: 400,

      getFixedISO() {
        const target = this.FIXED_ISO;
        if (!this.supportsISO || !this.caps?.iso) return target;
        const { min, max } = this.caps.iso;
        return Math.round(Math.max(min, Math.min(target, max)));
      },

      getETFloor() {
        const C_EMP = 30.86;
        const E_OVERWHELM = 1000;
        const N = this.aperture;
        const iso = this.getFixedISO();
        return N * N * C_EMP * 1e6 / (E_OVERWHELM * iso);
      },

      getETFromSlider() {
        if (!this.caps?.exposureTime) return 0;
        const val = parseInt(this.etSlider.value);
        const { min, max } = this.caps.exposureTime;
        const etFloor = this.getETFloor();
        const effectiveMin = Math.min(Math.max(min, etFloor), max);
        const logMin = Math.log(effectiveMin);
        const logMax = Math.log(max);
        const t = (val - 1) / 99;
        return Math.max(min, Math.min(max,
          Math.round(Math.exp(logMin + t * (logMax - logMin)))));
      },

      async applyET() {
        if (!this.track || !this.caps?.exposureTime) return;
        const et = this.getETFromSlider();
        this.manualET = et;
        this.etVal.textContent = et + '\xB5s';
        const constraint = { exposureMode: 'manual', exposureTime: et };
        if (this.supportsISO) constraint.iso = this.getFixedISO();
        try {
          await this.track.applyConstraints({ advanced: [constraint] });
        } catch (e) {
          console.warn('Manual ET failed:', e);
        }
      },

      autoAdjustET(measured) {
        if (!this.caps?.exposureTime || this._etApplyPending) return;
        if (Math.abs(measured - this.AE_TARGET) < this.AE_LUM_DEADBAND) return;
        const { min, max } = this.caps.exposureTime;
        const etFloor = Math.max(min, this.getETFloor());
        const currentET = this.manualET || etFloor;
        const ratio = this.AE_TARGET / Math.max(measured, 0.001);
        const logCurrent = Math.log(currentET);
        const logTarget = Math.log(Math.max(etFloor, Math.min(max, currentET * ratio)));
        const logNew = logCurrent + this.AE_DAMPING * (logTarget - logCurrent);
        const newET = Math.max(etFloor, Math.min(max, Math.round(Math.exp(logNew))));
        this.manualET = newET;
        this.etVal.textContent = newET + '\xB5s';
        this.syncSliderToET(newET);
        this._etApplyPending = true;
        const constraint = { exposureMode: 'manual', exposureTime: newET };
        if (this.supportsISO) constraint.iso = this.getFixedISO();
        this.track.applyConstraints({ advanced: [constraint] })
          .catch(e => console.warn('Auto ET failed:', e))
          .finally(() => { this._etApplyPending = false; });
      },

      syncSliderToET(et) {
        if (!this.caps?.exposureTime) return;
        const { min, max } = this.caps.exposureTime;
        const etFloor = this.getETFloor();
        const effectiveMin = Math.min(Math.max(min, etFloor), max);
        const logMin = Math.log(effectiveMin);
        const logMax = Math.log(max);
        if (logMax <= logMin) { this.etSlider.value = 1; return; }
        const t = (Math.log(Math.max(effectiveMin, Math.min(max, et))) - logMin) / (logMax - logMin);
        this.etSlider.value = Math.round(1 + t * 99);
      },

      updateAutoIndicator() {
        if (this.etAutoSpan) {
          this.etAutoSpan.style.display = (this.etOn && this.autoET) ? '' : 'none';
        }
      },

      async resetExposure() {
        this.manualET = null;
        if (!this.track?.getCapabilities) return;
        if (!this.caps) this.caps = this.track.getCapabilities();
        if (this.caps.exposureMode?.includes('continuous')) {
          try {
            await this.track.applyConstraints({
              advanced: [{ exposureMode: 'continuous' }]
            });
          } catch (e) { /* best effort */ }
        }
      },

      async toggleET() {
        this.etOn = !this.etOn;
        this.btnET.classList.toggle('on', this.etOn);
        if (this.etOn) {
          this.autoET = true;
          this.meterFrameCounter = 0;
          this.etRow.style.display = 'flex';
          this.updateAutoIndicator();
          await this.applyET();
        } else {
          this.autoET = false;
          this.etRow.style.display = 'none';
          this.updateAutoIndicator();
          await this.resetExposure();
        }
      },

      toggleGrayscale() {
        this.grayscaleOn = !this.grayscaleOn;
        this.btnGray.classList.toggle('on', this.grayscaleOn);
      },

      onGrayModeChange() {
        this.grayMode = this.grayModeSelect.value;
      },

      toggleBlur() {
        this.blurOn = !this.blurOn;
        this.btnBlur.classList.toggle('on', this.blurOn);
        this.blurRow.style.display = this.blurOn ? 'flex' : 'none';
        this.updateBlurCSS();
      },

      onBlurChange() {
        this.blurVA = parseInt(this.blurSlider.value) / 1000;
        this.blurVal.textContent = this.blurVA.toFixed(3);
        this.updateBlurCSS();
      },

      updateBlurCSS() {
        this.canvas.style.filter = this.blurOn
          ? 'blur(' + this.getBlurSigma().toFixed(2) + 'px)'
          : 'none';
      },

      getBlurSigma() {
        const K = 0.3;
        return (1 / this.blurVA - 1) * K;
      },

      toggleSettings() {
        this.settingsOpen = !this.settingsOpen;
        if (this.settingsOpen) {
          const rect = this.btnSettings.getBoundingClientRect();
          this.settingsPanel.style.top = (rect.bottom + 6) + 'px';
        }
        this.settingsPanel.style.display = this.settingsOpen ? 'flex' : 'none';
        this.btnSettings.classList.toggle('on', this.settingsOpen);
      },

      onLanguageChange() {
        const v = this.langSelect.value;
        try {
          if (v === 'auto') {
            localStorage.removeItem(LOCALE_STORAGE_KEY);
          } else {
            localStorage.setItem(LOCALE_STORAGE_KEY, v);
          }
        } catch (e) { /* private mode */ }
        this.applyLocale();
      },

      applyLocale() {
        const effective = getEffectiveLocale();
        this.locale = effective;
        this.strings = I18N[effective] || I18N.en;
        const t = this.strings;
        document.documentElement.lang = effective === 'cs' ? 'cs' : 'en';
        document.title = t.title;
        this.btnGray.textContent = t.grayscale;
        this.btnGray.title = t.grayscaleTitle;
        this.btnBlur.textContent = t.blur;
        this.btnET.textContent = t.glare;
        this.btnET.title = t.glareTitle;
        this.btnSettings.title = t.settingsTitle;
        document.getElementById('label-gray-type').textContent = t.grayType;
        document.getElementById('label-language').textContent = t.langLabel;
        document.getElementById('label-camera').textContent = t.camera;
        document.getElementById('label-sharpness').textContent = t.sharpness;
        document.getElementById('label-shutter').childNodes[0].textContent = t.shutter + ' ';
        if (this.etAutoSpan) this.etAutoSpan.textContent = t.shutterAuto;
        const optS = this.grayModeSelect.querySelector('option[value="scotopic"]');
        const optR = this.grayModeSelect.querySelector('option[value="rec601"]');
        if (optS) optS.textContent = t.grayScience;
        if (optR) optR.textContent = t.grayPlain;
        const optAuto = this.langSelect.querySelector('option[value="auto"]');
        const optEn   = this.langSelect.querySelector('option[value="en"]');
        const optCs   = this.langSelect.querySelector('option[value="cs"]');
        if (optAuto) optAuto.textContent = t.langAuto;
        if (optEn)   optEn.textContent = t.langEn;
        if (optCs)   optCs.textContent = t.langCs;
        this.langSelect.value = readLocaleOverride() || 'auto';
        if (this.errorDiv.style.display === 'block' && this._lastErrorKey) {
          this.showError(this._lastErrorKey, ...(this._lastErrorParams || []));
        }
      },

      showError(msgKey, ...params) {
        const t = this.strings || I18N.en;
        const known = Object.prototype.hasOwnProperty.call(t, msgKey);
        let fmt = known ? t[msgKey] : msgKey;
        for (let i = 0; i < params.length; i++) {
          fmt = fmt.split('{' + i + '}').join(String(params[i]));
        }
        this._lastErrorKey = msgKey;
        this._lastErrorParams = params;
        this.errorDiv.textContent = fmt;
        this.errorDiv.style.display = 'block';
        console.error(fmt);
      },

      cleanup() {
        if (this.rafId) { cancelAnimationFrame(this.rafId); this.rafId = null; }
        if (this.stream) { this.stream.getTracks().forEach(t => t.stop()); this.stream = null; }
        this.track = null;
        this.gl = null;
      }
    };

    sim.applyLocale();

    sim.btnGray.addEventListener('click', () => sim.toggleGrayscale());
    sim.btnET.addEventListener('click', () => sim.toggleET());
    sim.btnBlur.addEventListener('click', () => sim.toggleBlur());
    sim.btnSettings.addEventListener('click', () => sim.toggleSettings());
    sim.camSelect.addEventListener('change', () => sim.onCameraSelectChange());
    sim.etSlider.addEventListener('input', () => {
      sim.autoET = false;
      sim.updateAutoIndicator();
      sim.applyET();
    });
    sim.blurSlider.addEventListener('input', () => sim.onBlurChange());
    sim.grayModeSelect.addEventListener('change', () => sim.onGrayModeChange());
    sim.langSelect.addEventListener('change', () => sim.onLanguageChange());

    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => sim.updateCanvasSize(), 100);
    });
    window.addEventListener('unload', () => sim.cleanup());

    document.addEventListener('visibilitychange', async () => {
      if (document.hidden) {
        if (sim.rafId) { cancelAnimationFrame(sim.rafId); sim.rafId = null; }
        if (sim.stream) {
          sim.stream.getTracks().forEach(t => t.stop());
          sim.stream = null;
          sim.track = null;
          sim.video.srcObject = null;
        }
      } else {
        if (sim.stream || sim.rafId) return;
        try {
          const deviceId = sim.cameras[sim.cameraIndex]?.deviceId;
          const videoConstraints = deviceId
            ? { deviceId: { exact: deviceId }, width: { ideal: 1920 }, height: { ideal: 1080 } }
            : { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } };
          const stream = await navigator.mediaDevices.getUserMedia({ video: videoConstraints });
          if (document.hidden) {
            stream.getTracks().forEach(t => t.stop());
            return;
          }
          await sim.attachAndPrepareStream(stream);
          sim.processFrame();
        } catch (err) {
          sim.showError('errCameraFailed', err.message);
        }
      }
    });

    sim.start();
  </script>
</body>
</html>
