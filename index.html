<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Achromatopsia Simulator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: black; font-family: system-ui, sans-serif; }
    #video { display: none; }
    #canvas { width: 100vw; height: 100vh; object-fit: cover; display: block; }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 70px;
      color: #eee;
      background: rgba(0,0,0,0.55);
      padding: 6px 10px;
      font-size: 13px;
      border-radius: 6px;
      display: none;
      line-height: 1.3;
    }
    #error {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      color: #ff6b6b;
      background: rgba(0,0,0,0.7);
      padding: 8px 12px;
      font-size: 14px;
      border-radius: 6px;
      display: none;
    }
    .controls {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 10;
    }
    .tbtn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      background: rgba(0,0,0,0.5);
      color: #999;
      font-size: 13px;
      font-weight: 700;
      line-height: 40px;
      text-align: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .tbtn:active { background: rgba(255,255,255,0.15); }
    .tbtn.on {
      border-color: rgba(255,255,255,0.7);
      color: #fff;
    }
    #et-wrap {
      position: absolute;
      bottom: 20px;
      left: 16px;
      right: 16px;
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.55);
      padding: 8px 12px;
      border-radius: 8px;
    }
    #et-wrap label {
      color: #ccc;
      font-size: 12px;
      white-space: nowrap;
    }
    #et-slider {
      flex: 1;
      accent-color: #aaa;
    }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
  <div id="error" role="alert"></div>
  <div id="info"></div>
  <div class="controls">
    <div id="btn-gray" class="tbtn on" title="Grayscale">G</div>
    <div id="btn-sig" class="tbtn" title="Sigmoid wash-out">S</div>
  </div>
  <div id="et-wrap">
    <label>auto</label>
    <input type="range" id="et-slider" min="0" max="100" value="0">
    <label id="et-value">auto</label>
  </div>
  <script>
    const sim = {
      video: document.getElementById('video'),
      canvas: document.getElementById('canvas'),
      errorDiv: document.getElementById('error'),
      infoDiv: document.getElementById('info'),
      btnGray: document.getElementById('btn-gray'),
      btnSig: document.getElementById('btn-sig'),
      etWrap: document.getElementById('et-wrap'),
      etSlider: document.getElementById('et-slider'),
      etValueLabel: document.getElementById('et-value'),
      stream: null,
      track: null,
      rafId: null,
      ctx: null,
      caps: null,
      supportsET: false,
      grayscaleOn: true,
      sigmoidOn: false,
      manualET: null,
      MAX_PROCESS_WIDTH: 640,

      async start() {
        if (!navigator.mediaDevices?.getUserMedia) {
          this.showError('Camera access not supported. Try Chrome or Safari.');
          return;
        }
        try {
          this.stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment' }
          });
          this.track = this.stream.getVideoTracks()[0];
          this.video.srcObject = this.stream;
          this.video.onloadedmetadata = () => {
            this.updateCanvasSize();
            this.detectCapabilities();
            this.updateInfo();
            this.processFrame();
          };
        } catch (err) {
          this.showError(`Camera failed: ${err.message}`);
        }
      },

      detectCapabilities() {
        if (!this.track.getCapabilities) return;
        this.caps = this.track.getCapabilities();
        console.log('Camera capabilities:', this.caps);

        this.supportsET = !!(
          this.caps.exposureMode?.includes('manual') &&
          this.caps.exposureTime
        );

        if (this.supportsET) {
          this.etWrap.style.display = 'flex';
        }
      },

      getETFromSlider() {
        const val = parseInt(this.etSlider.value);
        if (val === 0) return null;
        const { min, max } = this.caps.exposureTime;
        const logMin = Math.log(min);
        const logMax = Math.log(max);
        const t = val / 100;
        return Math.round(Math.exp(logMin + t * (logMax - logMin)));
      },

      async onETChange() {
        const et = this.getETFromSlider();
        if (et === null) {
          this.manualET = null;
          this.etValueLabel.textContent = 'auto';
          await this.resetExposure();
        } else {
          this.manualET = et;
          this.etValueLabel.textContent = et + '\xB5s';
          try {
            await this.track.applyConstraints({
              advanced: [{ exposureMode: 'manual', exposureTime: et }]
            });
          } catch (e) {
            console.warn('Manual ET failed:', e);
          }
        }
        this.updateInfo();
      },

      async resetExposure() {
        if (!this.track?.getCapabilities) return;
        if (!this.caps) this.caps = this.track.getCapabilities();
        if (this.caps.exposureMode?.includes('continuous')) {
          try {
            await this.track.applyConstraints({
              advanced: [{ exposureMode: 'continuous' }]
            });
          } catch (e) { /* best effort */ }
        }
      },

      toggleGrayscale() {
        this.grayscaleOn = !this.grayscaleOn;
        this.btnGray.classList.toggle('on', this.grayscaleOn);
        this.updateInfo();
      },

      toggleSigmoid() {
        this.sigmoidOn = !this.sigmoidOn;
        this.btnSig.classList.toggle('on', this.sigmoidOn);
        this.updateInfo();
      },

      updateInfo() {
        const parts = [];
        if (this.grayscaleOn) parts.push('grayscale');
        if (this.manualET != null) parts.push('ET ' + this.manualET + '\xB5s');
        else if (this.supportsET) parts.push('ET auto');
        if (this.sigmoidOn) parts.push('sigmoid');
        this.showInfo(parts.length ? parts.join(' | ') : 'no effects');
      },

      updateCanvasSize() {
        const vw = this.video.videoWidth;
        const vh = this.video.videoHeight;
        if (!vw || !vh) return;
        const scale = Math.min(1, this.MAX_PROCESS_WIDTH / vw);
        this.canvas.width = Math.round(vw * scale);
        this.canvas.height = Math.round(vh * scale);
        this.ctx = this.canvas.getContext('2d', { willReadFrequently: true });
      },

      processFrame() {
        const ctx = this.ctx;
        if (!ctx) { this.rafId = requestAnimationFrame(() => this.processFrame()); return; }
        const w = this.canvas.width;
        const h = this.canvas.height;

        ctx.drawImage(this.video, 0, 0, w, h);

        const needsPixelWork = this.grayscaleOn || this.sigmoidOn;
        if (needsPixelWork) {
          const imgData = ctx.getImageData(0, 0, w, h);
          const data = imgData.data;
          const len = data.length;
          const doGray = this.grayscaleOn;
          const doSigmoid = this.sigmoidOn;

          for (let i = 0; i < len; i += 4) {
            let lum = doGray
              ? 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2]
              : (data[i] + data[i + 1] + data[i + 2]) / 3;

            if (doSigmoid) {
              const t = lum / 255;
              const blend = 1 / (1 + Math.exp(-12 * (t - 0.6)));
              lum = lum + blend * (255 - lum);
            }

            if (doGray) {
              data[i] = data[i + 1] = data[i + 2] = lum;
            } else if (doSigmoid) {
              const scale = lum / ((data[i] + data[i + 1] + data[i + 2]) / 3 || 1);
              data[i] = Math.min(255, data[i] * scale);
              data[i + 1] = Math.min(255, data[i + 1] * scale);
              data[i + 2] = Math.min(255, data[i + 2] * scale);
            }
          }

          ctx.putImageData(imgData, 0, 0);
        }

        this.rafId = requestAnimationFrame(() => this.processFrame());
      },

      showError(msg) {
        this.errorDiv.textContent = msg;
        this.errorDiv.style.display = 'block';
        console.error(msg);
      },

      showInfo(msg) {
        this.infoDiv.textContent = msg;
        this.infoDiv.style.display = 'block';
      },

      cleanup() {
        if (this.rafId) cancelAnimationFrame(this.rafId);
        if (this.stream) this.stream.getTracks().forEach(t => t.stop());
      }
    };

    document.getElementById('btn-gray').addEventListener('click', () => sim.toggleGrayscale());
    document.getElementById('btn-sig').addEventListener('click', () => sim.toggleSigmoid());
    document.getElementById('et-slider').addEventListener('input', () => sim.onETChange());

    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => sim.updateCanvasSize(), 100);
    });
    window.addEventListener('unload', () => sim.cleanup());
    sim.start();
  </script>
</body>
</html>
