<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Achromatopsia Simulator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: black; font-family: system-ui, sans-serif; }
    #video { display: none; }
    #canvas { width: 100vw; height: 100vh; object-fit: cover; display: block; }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 70px;
      color: #eee;
      background: rgba(0,0,0,0.55);
      padding: 6px 10px;
      font-size: 13px;
      border-radius: 6px;
      display: none;
      line-height: 1.3;
    }
    #error {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      color: #ff6b6b;
      background: rgba(0,0,0,0.7);
      padding: 8px 12px;
      font-size: 14px;
      border-radius: 6px;
      display: none;
    }
    .controls {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 10;
    }
    .tbtn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      background: rgba(0,0,0,0.5);
      color: #999;
      font-size: 13px;
      font-weight: 700;
      line-height: 40px;
      text-align: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .tbtn:active { background: rgba(255,255,255,0.15); }
    .tbtn.on { border-color: rgba(255,255,255,0.7); color: #fff; }
    .tbtn.hidden { display: none; }
    #sliders {
      position: absolute;
      bottom: 20px;
      left: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
    }
    .slider-row {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.55);
      padding: 8px 12px;
      border-radius: 8px;
    }
    .slider-row label {
      color: #ccc;
      font-size: 12px;
      white-space: nowrap;
      min-width: 28px;
    }
    .slider-row .val {
      min-width: 48px;
      text-align: right;
    }
    .slider-row input[type=range] {
      flex: 1;
      accent-color: #aaa;
    }
    .slider-row select {
      flex: 1;
      background: rgba(255,255,255,0.1);
      color: #ccc;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      padding: 4px 6px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="error" role="alert"></div>
  <div id="info"></div>
  <div class="controls">
    <div id="btn-gray" class="tbtn on" title="Grayscale">G</div>
    <div id="btn-blur" class="tbtn on" title="Acuity blur">B</div>
    <div id="btn-et" class="tbtn hidden" title="Exposure">E</div>
    <div id="btn-sig" class="tbtn" title="Glare">L</div>
    <div id="btn-cam" class="tbtn hidden" title="Switch camera">C</div>
  </div>
  <div id="sliders">
    <div id="gray-row" class="slider-row" style="display:flex">
      <label>mode</label>
      <select id="gray-mode">
        <option value="scotopic" selected>scotopic (rod vision)</option>
        <option value="rec601">rec. 601 (standard B&W)</option>
      </select>
    </div>
    <div id="blur-row" class="slider-row" style="display:flex">
      <label>VA</label>
      <input type="range" id="blur-slider" min="5" max="50" value="10" step="5">
      <label id="blur-val" class="val">0.10</label>
    </div>
    <div id="et-row" class="slider-row">
      <label>ET</label>
      <input type="range" id="et-slider" min="1" max="100" value="50">
      <label id="et-val" class="val">--</label>
    </div>
    <div id="sig-row" class="slider-row">
      <label>thr</label>
      <input type="range" id="sig-slider" min="30" max="80" value="60">
      <label id="sig-val" class="val">0.50</label>
    </div>
  </div>
  <script>
    const sim = {
      video: document.getElementById('video'),
      canvas: document.getElementById('canvas'),
      errorDiv: document.getElementById('error'),
      infoDiv: document.getElementById('info'),
      btnGray: document.getElementById('btn-gray'),
      btnET: document.getElementById('btn-et'),
      btnSig: document.getElementById('btn-sig'),
      etRow: document.getElementById('et-row'),
      etSlider: document.getElementById('et-slider'),
      etVal: document.getElementById('et-val'),
      sigRow: document.getElementById('sig-row'),
      sigSlider: document.getElementById('sig-slider'),
      sigVal: document.getElementById('sig-val'),
      grayRow: document.getElementById('gray-row'),
      grayModeSelect: document.getElementById('gray-mode'),
      btnBlur: document.getElementById('btn-blur'),
      blurRow: document.getElementById('blur-row'),
      blurSlider: document.getElementById('blur-slider'),
      blurVal: document.getElementById('blur-val'),
      btnCam: document.getElementById('btn-cam'),
      stream: null,
      track: null,
      rafId: null,
      ctx: null,
      caps: null,
      supportsET: false,
      grayscaleOn: true,
      grayMode: 'scotopic',
      srgbToLinear: null,
      etOn: false,
      sigmoidOn: false,
      manualET: null,
      sigmoidMidpoint: 0.50,
      blurOn: true,
      blurVA: 0.10,
      cameras: [],
      cameraIndex: -1,
      MAX_PROCESS_WIDTH: 640,

      async start() {
        this.srgbToLinear = new Float32Array(256);
        for (let i = 0; i < 256; i++) {
          const s = i / 255;
          this.srgbToLinear[i] = s <= 0.04045 ? s / 12.92 : Math.pow((s + 0.055) / 1.055, 2.4);
        }

        if (!navigator.mediaDevices?.getUserMedia) {
          this.showError('Camera access not supported. Try Chrome or Safari.');
          return;
        }
        try {
          this.stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment' }
          });
          this.track = this.stream.getVideoTracks()[0];
          this.video.srcObject = this.stream;
          this.video.onloadedmetadata = async () => {
            this.updateCanvasSize();
            this.updateBlurCSS();
            this.detectCapabilities();
            await this.enumerateCameras();
            this.updateInfo();
            this.processFrame();
          };
          await this.video.play();
        } catch (err) {
          this.showError(`Camera failed: ${err.message}`);
        }
      },

      detectCapabilities() {
        if (!this.track.getCapabilities) return;
        this.caps = this.track.getCapabilities();
        console.log('Camera capabilities:', this.caps);

        this.supportsET = !!(
          this.caps.exposureMode?.includes('manual') &&
          this.caps.exposureTime
        );

        if (this.supportsET) {
          this.btnET.classList.remove('hidden');
        }
      },

      async enumerateCameras() {
        if (!navigator.mediaDevices?.enumerateDevices) return;
        const devices = await navigator.mediaDevices.enumerateDevices();
        const allVideo = devices.filter(d => d.kind === 'videoinput');

        this.cameras = allVideo.filter(d => {
          if (typeof d.getCapabilities === 'function') {
            const caps = d.getCapabilities();
            if (caps.facingMode?.length) return caps.facingMode.includes('environment');
          }
          return /back|environment/i.test(d.label);
        });
        if (!this.cameras.length) this.cameras = allVideo;

        this.cameras.sort((a, b) => {
          const idA = a.label.match(/camera\s*(\d+)/i);
          const idB = b.label.match(/camera\s*(\d+)/i);
          return (idA ? +idA[1] : 999) - (idB ? +idB[1] : 999);
        });

        if (this.cameras.length > 1) this.btnCam.classList.remove('hidden');

        const currentId = this.track?.getSettings()?.deviceId;
        this.cameraIndex = this.cameras.findIndex(c => c.deviceId === currentId);
        if (this.cameraIndex === -1) this.cameraIndex = 0;

        if (this.cameraIndex !== 0) await this.switchCamera(0);
      },

      async switchCamera(targetIndex) {
        if (this.cameras.length < 2) return;
        this.cameraIndex = targetIndex !== undefined
          ? targetIndex
          : (this.cameraIndex + 1) % this.cameras.length;
        const deviceId = this.cameras[this.cameraIndex].deviceId;
        if (this.stream) {
          this.stream.getTracks().forEach(t => t.stop());
          this.video.srcObject = null;
        }
        for (let attempt = 0; attempt < 3; attempt++) {
          await new Promise(r => setTimeout(r, 300 * (attempt + 1)));
          try {
            this.stream = await navigator.mediaDevices.getUserMedia({
              video: { deviceId: { exact: deviceId } }
            });
            this.track = this.stream.getVideoTracks()[0];
            this.video.srcObject = this.stream;
            this.video.onloadedmetadata = () => {
              this.updateCanvasSize();
              this.updateBlurCSS();
              this.detectCapabilities();
              this.updateInfo();
            };
            await this.video.play();
            return;
          } catch (err) {
            if (attempt === 2) this.showError('Camera switch failed: ' + err.message);
          }
        }
      },

      getETFromSlider() {
        const val = parseInt(this.etSlider.value);
        const { min, max } = this.caps.exposureTime;
        const logMin = Math.log(min);
        const logMax = Math.log(max);
        const t = (val - 1) / 99;
        return Math.round(Math.exp(logMin + t * (logMax - logMin)));
      },

      async applyET() {
        const et = this.getETFromSlider();
        this.manualET = et;
        this.etVal.textContent = et + '\xB5s';
        try {
          await this.track.applyConstraints({
            advanced: [{ exposureMode: 'manual', exposureTime: et }]
          });
        } catch (e) {
          console.warn('Manual ET failed:', e);
        }
        this.updateInfo();
      },

      async resetExposure() {
        this.manualET = null;
        if (!this.track?.getCapabilities) return;
        if (!this.caps) this.caps = this.track.getCapabilities();
        if (this.caps.exposureMode?.includes('continuous')) {
          try {
            await this.track.applyConstraints({
              advanced: [{ exposureMode: 'continuous' }]
            });
          } catch (e) { /* best effort */ }
        }
      },

      async toggleET() {
        this.etOn = !this.etOn;
        this.btnET.classList.toggle('on', this.etOn);
        if (this.etOn) {
          this.etRow.style.display = 'flex';
          await this.applyET();
        } else {
          this.etRow.style.display = 'none';
          await this.resetExposure();
          this.updateInfo();
        }
      },

      toggleGrayscale() {
        this.grayscaleOn = !this.grayscaleOn;
        this.btnGray.classList.toggle('on', this.grayscaleOn);
        this.grayRow.style.display = this.grayscaleOn ? 'flex' : 'none';
        this.updateInfo();
      },

      onGrayModeChange() {
        this.grayMode = this.grayModeSelect.value;
        this.updateInfo();
      },

      toggleSigmoid() {
        this.sigmoidOn = !this.sigmoidOn;
        this.btnSig.classList.toggle('on', this.sigmoidOn);
        this.sigRow.style.display = this.sigmoidOn ? 'flex' : 'none';
        this.updateInfo();
      },

      onSigmoidThresholdChange() {
        this.sigmoidMidpoint = (110 - parseInt(this.sigSlider.value)) / 100;
        this.sigVal.textContent = this.sigmoidMidpoint.toFixed(2);
        this.updateInfo();
      },

      toggleBlur() {
        this.blurOn = !this.blurOn;
        this.btnBlur.classList.toggle('on', this.blurOn);
        this.blurRow.style.display = this.blurOn ? 'flex' : 'none';
        this.updateBlurCSS();
        this.updateInfo();
      },

      onBlurChange() {
        this.blurVA = parseInt(this.blurSlider.value) / 100;
        this.blurVal.textContent = this.blurVA.toFixed(2);
        this.updateBlurCSS();
        this.updateInfo();
      },

      updateBlurCSS() {
        this.canvas.style.filter = this.blurOn
          ? 'blur(' + this.getBlurSigma().toFixed(2) + 'px)'
          : 'none';
      },

      getBlurSigma() {
        const K = 0.3;
        return (1 / this.blurVA - 1) * K;
      },

      getCameraLabel() {
        if (this.cameraIndex < 0 || !this.cameras[this.cameraIndex]) return '';
        const label = this.cameras[this.cameraIndex].label || '';
        return label.length > 30 ? label.substring(0, 30) + '\u2026' : label;
      },

      updateInfo() {
        const parts = [];
        if (this.grayscaleOn) parts.push('grayscale (' + this.grayMode + ')');
        if (this.blurOn) parts.push('VA ' + this.blurVA.toFixed(2));
        if (this.etOn && this.manualET != null) parts.push('ET ' + this.manualET + '\xB5s');
        if (this.sigmoidOn) parts.push('glare (' + this.sigmoidMidpoint.toFixed(2) + ')');
        const cam = this.getCameraLabel();
        if (cam) parts.push(cam);
        this.showInfo(parts.length ? parts.join(' | ') : 'no effects');
      },

      updateCanvasSize() {
        const vw = this.video.videoWidth;
        const vh = this.video.videoHeight;
        if (!vw || !vh) return;
        const scale = Math.min(1, this.MAX_PROCESS_WIDTH / vw);
        this.canvas.width = Math.round(vw * scale);
        this.canvas.height = Math.round(vh * scale);
        this.ctx = this.canvas.getContext('2d', { willReadFrequently: true });
      },

      processFrame() {
        const ctx = this.ctx;
        if (!ctx) { this.rafId = requestAnimationFrame(() => this.processFrame()); return; }
        const w = this.canvas.width;
        const h = this.canvas.height;

        ctx.drawImage(this.video, 0, 0, w, h);

        const doGray = this.grayscaleOn;
        const doSigmoid = this.sigmoidOn;
        if (doGray || doSigmoid) {
          const imgData = ctx.getImageData(0, 0, w, h);
          const data = imgData.data;
          const len = data.length;
          const mid = this.sigmoidMidpoint;
          const mode = this.grayMode;
          const s2l = this.srgbToLinear;

          for (let i = 0; i < len; i += 4) {
            let lum;
            if (!doGray) {
              lum = (data[i] + data[i + 1] + data[i + 2]) / 3;
            } else if (mode === 'rec601') {
              lum = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
            } else {
              const linLum = 0.007 * s2l[data[i]] + 0.519 * s2l[data[i + 1]] + 0.474 * s2l[data[i + 2]];
              lum = 255 * (linLum <= 0.0031308 ? 12.92 * linLum : 1.055 * Math.pow(linLum, 1 / 2.4) - 0.055);
            }

            if (doSigmoid) {
              const t = lum / 255;
              const blend = 1 / (1 + Math.exp(-12 * (t - mid)));
              lum = lum + blend * (255 - lum);
            }

            if (doGray) {
              data[i] = data[i + 1] = data[i + 2] = lum;
            } else if (doSigmoid) {
              const avg = (data[i] + data[i + 1] + data[i + 2]) / 3 || 1;
              const s = lum / avg;
              data[i] = Math.min(255, data[i] * s);
              data[i + 1] = Math.min(255, data[i + 1] * s);
              data[i + 2] = Math.min(255, data[i + 2] * s);
            }
          }

          ctx.putImageData(imgData, 0, 0);
        }

        this.rafId = requestAnimationFrame(() => this.processFrame());
      },

      showError(msg) {
        this.errorDiv.textContent = msg;
        this.errorDiv.style.display = 'block';
        console.error(msg);
      },

      showInfo(msg) {
        this.infoDiv.textContent = msg;
        this.infoDiv.style.display = 'block';
      },

      cleanup() {
        if (this.rafId) cancelAnimationFrame(this.rafId);
        if (this.stream) this.stream.getTracks().forEach(t => t.stop());
      }
    };

    document.getElementById('btn-gray').addEventListener('click', () => sim.toggleGrayscale());
    document.getElementById('btn-et').addEventListener('click', () => sim.toggleET());
    document.getElementById('btn-sig').addEventListener('click', () => sim.toggleSigmoid());
    document.getElementById('btn-blur').addEventListener('click', () => sim.toggleBlur());
    document.getElementById('btn-cam').addEventListener('click', () => sim.switchCamera());
    document.getElementById('et-slider').addEventListener('input', () => sim.applyET());
    document.getElementById('sig-slider').addEventListener('input', () => sim.onSigmoidThresholdChange());
    document.getElementById('blur-slider').addEventListener('input', () => sim.onBlurChange());
    document.getElementById('gray-mode').addEventListener('change', () => sim.onGrayModeChange());

    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => sim.updateCanvasSize(), 100);
    });
    window.addEventListener('unload', () => sim.cleanup());
    sim.start();
  </script>
</body>
</html>
