<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Achromatopsia Simulator</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
    #video { display: none; }
    #canvas {
      width: 100%;
      height: 100%;
      object-fit: cover; /* Fill screen, crop as needed */
      display: block;
    }
    #error, #lux {
      display: none; /* Hidden by default */
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      background: rgba(0, 0, 0, 0.5);
      padding: 5px;
      font-size: 14px;
      max-width: 90%;
    }
    #error { color: red; aria-live: "assertive"; }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
  <div id="error" role="alert"></div>
  <div id="lux"></div>
  <script>
    const simulator = {
      video: document.getElementById('video'),
      canvas: document.getElementById('canvas'),
      errorDiv: document.getElementById('error'),
      infoDiv: document.getElementById('lux'),
      stream: null,
      track: null,
      rafId: null,
      hasManualExposure: false,

      async start() {
        if (!navigator.mediaDevices?.getUserMedia) {
          this.showError('Camera access not supported. Try Chrome or Safari.');
          return;
        }
        try {
          this.stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment' }
          });
          this.track = this.stream.getVideoTracks()[0];
          this.video.srcObject = this.stream;
          this.video.onloadedmetadata = () => {
            this.updateCanvasSize();
            this.tryManualExposure();
            this.processFrame();
          };
        } catch (err) {
          this.showError(`Camera failed: ${err.message}`);
        }
      },

      async tryManualExposure() {
        if (!this.track.getCapabilities) {
          this.showInfo('No exposure control API. Using pixel fallback.');
          return;
        }
        const caps = this.track.getCapabilities();
        console.log('Camera capabilities:', caps);

        if (!caps.exposureMode?.includes('manual')) {
          this.showInfo('Camera does not support manual exposure. Using pixel fallback.');
          return;
        }

        const constraints = { advanced: [{ exposureMode: 'manual' }] };
        const applied = ['manual exposure'];

        // Fix exposure time to a high value to prevent the camera from
        // compensating for bright light -- simulates rods that cannot
        // shorten their integration time.
        if (caps.exposureTime) {
          const maxET = caps.exposureTime.max;
          const targetET = Math.min(maxET, 33333);
          constraints.advanced[0].exposureTime = targetET;
          applied.push(`exposureTime=${targetET}µs`);
        }

        // Fix ISO to a high value to simulate rod gain that cannot decrease.
        if (caps.iso) {
          constraints.advanced[0].iso = caps.iso.max;
          applied.push(`iso=${caps.iso.max}`);
        }

        try {
          await this.track.applyConstraints(constraints);
          this.hasManualExposure = true;
          this.showInfo('HW exposure lock: ' + applied.join(', '));
        } catch (err) {
          console.warn('applyConstraints failed:', err);
          this.showInfo('Exposure lock failed. Using pixel fallback.');
        }
      },

      updateCanvasSize() {
        const aspectRatio = this.video.videoWidth / this.video.videoHeight;
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        let cw, ch;
        if (vw / vh > aspectRatio) { cw = vw; ch = vw / aspectRatio; }
        else { ch = vh; cw = vh * aspectRatio; }
        this.canvas.width = Math.round(cw);
        this.canvas.height = Math.round(ch);
      },

      processFrame() {
        const ctx = this.canvas.getContext('2d');
        ctx.drawImage(this.video, 0, 0, this.canvas.width, this.canvas.height);
        const imgData = ctx.getImageData(0, 0, this.canvas.width, this.canvas.height);
        const data = imgData.data;

        for (let i = 0; i < data.length; i += 4) {
          let lum = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];

          if (!this.hasManualExposure) {
            // Software fallback: per-pixel photophobia simulation.
            // Pixels above a threshold get pushed toward white with a
            // sigmoid curve, simulating local rod saturation.
            const t = lum / 255;
            // Soft-clip: steepness k controls how abrupt the wash-out is,
            // midpoint controls where saturation kicks in (~60% brightness).
            const k = 12;
            const midpoint = 0.6;
            const blend = 1 / (1 + Math.exp(-k * (t - midpoint)));
            lum = lum + blend * (255 - lum);
          }

          data[i] = data[i + 1] = data[i + 2] = lum;
        }

        ctx.putImageData(imgData, 0, 0);
        this.rafId = requestAnimationFrame(() => this.processFrame());
      },

      showError(message) {
        this.errorDiv.textContent = message;
        this.errorDiv.style.display = 'block';
        console.error(message);
      },

      showInfo(message) {
        this.infoDiv.textContent = message;
        this.infoDiv.style.display = 'block';
        console.log(message);
      },

      cleanup() {
        if (this.rafId) cancelAnimationFrame(this.rafId);
        if (this.stream) this.stream.getTracks().forEach(t => t.stop());
      }
    };

    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => simulator.updateCanvasSize(), 100);
    });
    window.addEventListener('unload', () => simulator.cleanup());
    simulator.start();
  </script>
</body>
</html>
